<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h3>* 커피 브랜드 선호 조사 결과 *</h3>
    {% if crossTab %}
        {{crossTab | safe}}
    {% endif %}
    <br>
    {% if results %}
        {{results | safe}}
    {% endif %}
    <hr>
    <h4>* 브랜드별 선호도 시각화 *</h4>
    {% if chart_path %}
        <img src="{{ url_for('static', filename=chart_path) }}?t={{ ts }}" width="600">
    {% else %}
        <p>차트 데이터를 불러올 수 없습니다.</p>
    {% endif %}
    <hr>
    <br>
    <a href="/coffee/survey">다시 설문조사</a>
    <br>
    <a href="/">메인 페이지</a>
    <hr>
    {% if df %}
        {{df | safe}}
    {% endif %}

</body>
</html>
